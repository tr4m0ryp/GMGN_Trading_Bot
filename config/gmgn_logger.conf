# GMGN Logger Configuration
# All monetary values are in USD

[connection]
# WebSocket endpoint
websocket_url = wss://gmgn.ai/ws

# Target blockchain (sol, eth, bsc, polygon)
chain = sol

# GMGN access token (leave empty for public channels only)
access_token = 

# Reconnection settings
reconnect_attempts = 10
reconnect_delay_ms = 1000
heartbeat_interval_ms = 30000

[filter]
# Market cap range (USD)
# Example: min 5500, max 10000 = $5.5K to $10K
min_market_cap = 5500
max_market_cap = 10000

# Minimum liquidity (USD)
min_liquidity = 5000

# Minimum 24h volume (USD)
min_volume_24h = 1000

# Holder requirements
min_holder_count = 10

# Maximum top 10 holders percentage (0-100)
max_top_10_ratio = 70

# Maximum creator balance percentage (0-100)
max_creator_ratio = 50

# Maximum token age in minutes (0 = no limit)
max_age_minutes = 10

# Minimum KOL (Key Opinion Leader) count
min_kol_count = 1

# Allowed exchanges (comma-separated, empty = all)
# Options: raydium, orca, meteora, jupiter, etc.
exchanges = raydium,orca,meteora

# Excluded symbols (comma-separated)
# Tokens containing these strings will be filtered out
exclude_symbols = SCAM,TEST,FAKE,RUG,HONEY

[output]
# Verbosity: 0=minimal, 1=normal, 2=verbose
verbosity = 1

# Enable timestamp prefixes
timestamps = true

# Stats print interval in seconds (0 = disabled)
stats_interval = 300
